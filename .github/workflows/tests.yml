name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"

  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # API 测试
  # ------------------------------------------------------------------
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: api

      - name: Sync dependencies
        run: uv sync

      - name: Run API Tests
        run: |
          uv run pytest tests/api \
            -v \
            --alluredir=allure-results \
            --junitxml=junit.xml

      - name: Upload API Allure Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-allure-results
          path: allure-results
          retention-days: 7

      - name: Upload API JUnit Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-junit-report
          path: junit.xml
          retention-days: 7

  # ------------------------------------------------------------------
  # UI 测试
  # ------------------------------------------------------------------
  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: ui

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Check site reachability（Playwright 实测，非 curl）
        id: check
        run: |
          uv run python << 'PYEOF'
          import sys, os
          from playwright.sync_api import sync_playwright

          blocked = False
          reason = ""

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              try:
                  resp = page.goto("https://practicesoftwaretesting.com/", timeout=15000)
                  body = page.content().lower()
                  status = resp.status if resp else 0

                  if status == 403 and ("cloudflare" in body or "checking your browser" in body):
                      blocked = True
                      reason = f"Cloudflare 拦截 (status={status})"
                  elif status != 200:
                      blocked = True
                      reason = f"站点不可达 (status={status})"
                  elif 'data-test="nav-home"' not in body:
                      blocked = True
                      reason = f"页面未正常渲染 (status={status}, 缺少 nav-home)"
                  else:
                      reason = f"✅ 站点可达 (status={status})"
              except Exception as e:
                  blocked = True
                  reason = f"Playwright 异常: {type(e).__name__}: {e}"
              finally:
                  browser.close()

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"blocked={'true' if blocked else 'false'}\n")
          label = "⚠️" if blocked else "✅"
          print(f"{label} {reason}")
          PYEOF

      - name: Run UI Tests
        if: steps.check.outputs.blocked != 'true'
        run: |
          uv run pytest tests/ui \
            -v \
            --screenshot=only-on-failure \
            --alluredir=allure-results \
            --junitxml=junit.xml

      - name: Upload UI Allure Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-allure-results
          path: allure-results
          retention-days: 7

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: test-results
          retention-days: 7

      - name: Upload UI JUnit Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-junit-report
          path: junit.xml
          retention-days: 7
