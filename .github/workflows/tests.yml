name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"

  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # API 测试
  # ------------------------------------------------------------------
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: api

      - name: Sync dependencies
        run: uv sync

      - name: Run API Tests
        run: |
          uv run pytest tests/api \
            -v \
            --alluredir=allure-results \
            --junitxml=junit.xml

      - name: Upload API Allure Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-allure-results
          path: allure-results
          retention-days: 7

      - name: Upload API JUnit Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-junit-report
          path: junit.xml
          retention-days: 7

  # ------------------------------------------------------------------
  # UI 测试
  # ------------------------------------------------------------------
  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: ui

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Check site reachability（Playwright 实测，非 curl）
        id: check
        run: uv run python scripts/check_site_reachability.py

      - name: Run UI Tests
        if: steps.check.outputs.blocked != 'true'
        run: |
          uv run pytest tests/ui \
            -v \
            --screenshot=only-on-failure \
            --alluredir=allure-results \
            --junitxml=junit.xml

      - name: Upload UI Allure Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-allure-results
          path: allure-results
          retention-days: 7

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: test-results
          retention-days: 7

      - name: Upload UI JUnit Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-junit-report
          path: junit.xml
          retention-days: 7
