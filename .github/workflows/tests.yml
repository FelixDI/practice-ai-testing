name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"

  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # API 测试
  # ------------------------------------------------------------------
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync

      - name: Run API Tests
        run: |
          uv run pytest tests/api \
            -v \
            --alluredir=allure-results \
            --junitxml=junit.xml

      - name: Upload API Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: allure-results
          retention-days: 7

      - name: Upload API JUnit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-report
          path: junit.xml
          retention-days: 7

  # ------------------------------------------------------------------
  # UI 测试
  # ------------------------------------------------------------------
  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Check site reachability
        id: check
        run: |
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" https://practicesoftwaretesting.com/ --max-time 10)
          BODY=$(curl -s https://practicesoftwaretesting.com/ --max-time 10 | head -5)
          echo "HTTP status: $STATUS"
          if echo "$BODY" | grep -qiE "cloudflare|checking your browser|403.*denied"; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ 站点被 Cloudflare 拦截，跳过 UI 测试"
          elif [ "$STATUS" != "200" ]; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ 站点不可达 (HTTP $STATUS)，跳过 UI 测试"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
            echo "✅ 站点可达，运行 UI 测试"
          fi

      - name: Run UI Tests
        if: steps.check.outputs.blocked != 'true'
        run: |
          uv run pytest tests/ui \
            -v \
            --screenshot=only-on-failure \
            --alluredir=allure-results \
            --junitxml=junit.xml

      - name: Upload UI Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: allure-results
          retention-days: 7

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results
          retention-days: 7

      - name: Upload UI JUnit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-junit-report
          path: junit.xml
          retention-days: 7
