name: API Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/api/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/api-tests.yml"

  pull_request:
    paths:
      - "src/**"
      - "tests/api/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/api-tests.yml"

# 同一分支/PR 的新 push 自动取消旧 run，避免并发打到共享 API
concurrency:
  group: api-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync

      - name: Run API Tests
        run: |
          uv run pytest tests/api \
            -v \
            --alluredir=allure-results \
            --junitxml=junit.xml

      # ------------------------------------------------------------------
      # 报告归档（无论测试通过与否都上传，方便排查）
      # ------------------------------------------------------------------
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: allure-results
          retention-days: 7

      - name: Upload JUnit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-report
          path: junit.xml
          retention-days: 7
