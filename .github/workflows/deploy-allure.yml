name: Deploy Allure Report

on:
  workflow_run:
    workflows:
      - API Tests
    types:
      - completed

permissions:
  contents: write   # gh-pages 部署
  actions: read     # 跨 workflow 下载 artifact

# 避免并发写 gh-pages 冲突
concurrency:
  group: allure-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 跨 workflow 下载 artifact（gh CLI 预装在 runner 上）
      # ------------------------------------------------------------------
      - name: Download API Allure Results
        run: |
          gh run download ${{ github.event.workflow_run.id }} \
            -n api-allure-results \
            -D allure-results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 安装 Allure CLI（缓存二进制，避免每次下载 ~70MB）
      # ------------------------------------------------------------------
      - name: Cache Allure CLI
        id: cache-allure
        uses: actions/cache@v4
        with:
          path: allure-2.33.0
          key: allure-cli-2.33.0

      - name: Install Allure
        if: steps.cache-allure.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.33.0/allure-2.33.0.tgz
          tar -xzf allure-2.33.0.tgz

      # ------------------------------------------------------------------
      # 生成报告 → 部署到 GitHub Pages
      # 用 keep_files: true 为未来 UI 报告留共存空间
      # ------------------------------------------------------------------
      - name: Generate Allure Report
        run: |
          ./allure-2.33.0/bin/allure generate \
            allure-results \
            -o api-allure-report \
            --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api-allure-report
          destination_dir: api-allure-report
          keep_files: true
