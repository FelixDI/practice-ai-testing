name: Deploy Allure Report

on:
  workflow_run:
    workflows:
      - Tests
    types:
      - completed

permissions:
  contents: write
  actions: read

concurrency:
  group: allure-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 下载 API + UI Allure 数据
      # ------------------------------------------------------------------
      - name: Download API Allure Results
        run: |
          gh run download ${{ github.event.workflow_run.id }} \
            -n api-allure-results \
            -D api-allure-results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download UI Allure Results
        run: |
          gh run download ${{ github.event.workflow_run.id }} \
            -n ui-allure-results \
            -D ui-allure-results \
            || echo "UI 测试结果尚未就绪，跳过"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 安装 Allure CLI（缓存 ~70MB 二进制）
      # ------------------------------------------------------------------
      - name: Cache Allure CLI
        id: cache-allure
        uses: actions/cache@v4
        with:
          path: allure-2.33.0
          key: allure-cli-2.33.0

      - name: Install Allure
        if: steps.cache-allure.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.33.0/allure-2.33.0.tgz
          tar -xzf allure-2.33.0.tgz

      # ------------------------------------------------------------------
      # 生成报告 → 部署 GitHub Pages
      # ------------------------------------------------------------------
      - name: Generate API Allure Report
        run: |
          ./allure-2.33.0/bin/allure generate \
            api-allure-results \
            -o _site/api-allure-report \
            --clean

      - name: Generate UI Allure Report
        run: |
          if [ -d "ui-allure-results" ]; then
            ./allure-2.33.0/bin/allure generate \
              ui-allure-results \
              -o _site/ui-allure-report \
              --clean
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
